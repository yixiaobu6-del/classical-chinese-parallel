<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>古文现代文平行阅读器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-5xl mx-auto p-4 md:p-6">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold mb-2"><i class="fa fa-book text-amber-700"></i> 古文现代文平行阅读器</h1>
      <p class="text-gray-500">经/史/子/集 经典文献 · 古文与白话对照阅读</p>
    </div>

    <!-- 学习进度面板 -->
    <div class="bg-white rounded-lg shadow p-4 mb-4">
      <div class="flex flex-wrap items-center gap-3">
        <div class="flex items-center gap-2">
          <span class="text-sm font-medium">学习进度</span>
          <span class="text-xs bg-blue-100 text-blue-700 px-2 py-0.5 rounded" id="learnedCount">已学 0</span>
          <span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded" id="unlearnedCount">未学 0</span>
        </div>
        <div class="flex-1 bg-gray-200 rounded-full h-2 max-w-xs">
          <div id="learnProgressBar" class="bg-blue-500 h-2 rounded-full transition-all" style="width:0%"></div>
        </div>
        <span class="text-xs text-gray-400" id="learnPercent">0%</span>
        <button onclick="filterLearned()" id="filterLearnedBtn" class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs hover:bg-blue-200"><i class="fa fa-graduation-cap"></i> 已学</button>
        <button onclick="filterUnlearned()" id="filterUnlearnedBtn" class="px-2 py-1 bg-gray-100 rounded text-xs hover:bg-gray-200"><i class="fa fa-book"></i> 未学</button>
        <button onclick="clearLearning()" class="px-2 py-1 bg-red-100 text-red-600 rounded text-xs hover:bg-red-200"><i class="fa fa-trash"></i> 重置进度</button>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow p-4 mb-4">
      <div class="flex flex-wrap gap-3 items-center">
        <div class="flex-1 min-w-[200px]">
          <input type="text" id="searchInput" class="w-full border rounded px-3 py-2" placeholder="搜索古文、现代文、关键词...">
        </div>
        <select id="filterGenre" class="border rounded px-3 py-2 text-sm">
          <option value="">全部部类</option>
          <option value="经">经部</option>
          <option value="史">史部</option>
          <option value="子">子部</option>
          <option value="集">集部</option>
        </select>
        <select id="filterDifficulty" class="border rounded px-3 py-2 text-sm">
          <option value="">全部难度</option>
          <option value="初级">初级</option>
          <option value="中级">中级</option>
          <option value="高级">高级</option>
        </select>
        <select id="filterSource" class="border rounded px-3 py-2 text-sm">
          <option value="">全部出处</option>
        </select>
        <button onclick="search()" class="bg-amber-600 text-white px-4 py-2 rounded hover:bg-amber-700">
          <i class="fa fa-search"></i> 搜索
        </button>
        <button onclick="randomItem()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
          <i class="fa fa-random"></i> 随机一篇
        </button>
      </div>
      <div class="flex gap-2 mt-3 flex-wrap">
        <span class="text-sm text-gray-400">快捷筛选：</span>
        <button onclick="quickFilter('论语')" class="px-2 py-1 bg-red-100 rounded text-xs hover:bg-red-200">论语</button>
        <button onclick="quickFilter('孟子')" class="px-2 py-1 bg-blue-100 rounded text-xs hover:bg-blue-200">孟子</button>
        <button onclick="quickFilter('老子')" class="px-2 py-1 bg-green-100 rounded text-xs hover:bg-green-200">老子</button>
        <button onclick="quickFilter('庄子')" class="px-2 py-1 bg-purple-100 rounded text-xs hover:bg-purple-200">庄子</button>
        <button onclick="quickFilter('史记')" class="px-2 py-1 bg-yellow-100 rounded text-xs hover:bg-yellow-200">史记</button>
        <button onclick="quickFilter('唐诗')" class="px-2 py-1 bg-pink-100 rounded text-xs hover:bg-pink-200">唐诗</button>
        <button onclick="quickFilter('宋词')" class="px-2 py-1 bg-indigo-100 rounded text-xs hover:bg-indigo-200">宋词</button>
        <button onclick="quickFilter('初中级')" class="px-2 py-1 bg-cyan-100 rounded text-xs hover:bg-cyan-200">初中级</button>
        <button onclick="quickFilter('高级')" class="px-2 py-1 bg-pink-100 rounded text-xs hover:bg-pink-200">高级</button>
      </div>
    </div>

    <div class="grid grid-cols-4 gap-3 mb-4">
      <div class="bg-white rounded shadow p-3 text-center"><div class="text-lg font-bold text-amber-600" id="totalCount">0</div><div class="text-xs text-gray-500">总条目</div></div>
      <div class="bg-white rounded shadow p-3 text-center"><div class="text-lg font-bold text-blue-600" id="genreCount">0</div><div class="text-xs text-gray-500">部类数</div></div>
      <div class="bg-white rounded shadow p-3 text-center"><div class="text-lg font-bold text-green-600" id="sourceCount">0</div><div class="text-xs text-gray-500">典籍数</div></div>
      <div class="bg-white rounded shadow p-3 text-center"><div class="text-lg font-bold text-purple-600" id="matchCount">0</div><div class="text-xs text-gray-500">匹配结果</div></div>
    </div>

    <div class="flex gap-2 mb-3">
      <button onclick="setLayout('parallel')" id="layoutParallel" class="px-3 py-1 bg-amber-500 text-white rounded text-sm">左右对照</button>
      <button onclick="setLayout('stacked')" id="layoutStacked" class="px-3 py-1 bg-gray-200 rounded text-sm">上下对照</button>
      <button onclick="setLayout('modern')" id="layoutModern" class="px-3 py-1 bg-gray-200 rounded text-sm">仅现代文</button>
      <span class="text-xs text-gray-400 ml-auto self-center">点击条目展开详情</span>
    </div>

    <div id="results" class="space-y-2"></div>

    <!-- 详情弹窗 -->
    <div id="detailModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4" onclick="closeDetail(event)">
      <div class="bg-white rounded-xl shadow-2xl max-w-3xl w-full max-h-[85vh] overflow-y-auto p-6" onclick="event.stopPropagation()">
        <div class="flex justify-between items-start mb-4">
          <div>
            <span id="detailSource" class="text-lg font-bold text-amber-700"></span>
            <span id="detailBadge" class="ml-2 text-xs px-2 py-0.5 rounded"></span>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="toggleLearned(currentDetailItemId)" id="learnBtn" class="bg-blue-500 text-white px-3 py-1.5 rounded text-sm hover:bg-blue-600">
              <i class="fa fa-graduation-cap"></i> <span id="learnBtnText">标记已学</span>
            </button>
            <button onclick="speakDetail()" id="speakBtn" class="bg-amber-500 text-white px-3 py-1.5 rounded text-sm hover:bg-amber-600">
              <i class="fa fa-volume-up"></i> 朗读
            </button>
            <button onclick="document.getElementById('detailModal').classList.add('hidden'); if(window.speechSynthesis) window.speechSynthesis.cancel();" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="bg-amber-50 rounded-lg p-4">
            <div class="text-xs text-amber-500 mb-2 font-medium">古文原文 <span class="text-gray-400 font-normal">（点击字词查看释义）</span></div>
            <div id="detailClassical" class="text-lg leading-relaxed cursor-pointer"></div>
          </div>
          <div class="bg-blue-50 rounded-lg p-4">
            <div class="text-xs text-blue-500 mb-2 font-medium">现代文翻译</div>
            <div id="detailModern" class="text-lg leading-relaxed"></div>
          </div>
        </div>
        <div id="detailNotes" class="mt-4 p-3 bg-gray-50 rounded-lg text-sm text-gray-600 hidden"></div>
        <div class="mt-3 flex flex-wrap gap-1" id="detailKeywords"></div>
      </div>
    </div>

    <!-- 字词释义弹窗 -->
    <div id="wordPopup" class="hidden fixed z-[60] bg-white rounded-lg shadow-2xl border border-amber-200 p-3 max-w-xs" style="display:none;">
      <div id="wordPopupContent"></div>
    </div>
  </div>

  <script>
    // ====== 学习进度存储 ======
    const LEARN_KEY = 'classical_reader_learned';
    let learnedSet = new Set(JSON.parse(localStorage.getItem(LEARN_KEY) || '[]'));
    let filterMode = ''; // '', 'learned', 'unlearned'
    let currentDetailItemId = null;

    function toggleLearned(id) {
      if (learnedSet.has(id)) {
        learnedSet.delete(id);
      } else {
        learnedSet.add(id);
      }
      localStorage.setItem(LEARN_KEY, JSON.stringify([...learnedSet]));
      updateLearnProgress();
      updateLearnBtn(id);
      // 如果处于过滤模式，刷新列表
      if (filterMode) search();
      else {
        renderResults(currentResults);
      }
    }

    function updateLearnProgress() {
      const total = corpus.length;
      const learned = learnedSet.size;
      const unlearned = total - learned;
      const pct = total > 0 ? Math.round(learned / total * 100) : 0;
      document.getElementById('learnedCount').textContent = `已学 ${learned}`;
      document.getElementById('unlearnedCount').textContent = `未学 ${unlearned}`;
      document.getElementById('learnProgressBar').style.width = pct + '%';
      document.getElementById('learnPercent').textContent = pct + '%';
    }

    function updateLearnBtn(id) {
      const isLearned = learnedSet.has(id);
      const btn = document.getElementById('learnBtn');
      const txt = document.getElementById('learnBtnText');
      if (isLearned) {
        btn.className = 'bg-green-500 text-white px-3 py-1.5 rounded text-sm hover:bg-green-600';
        txt.textContent = '已学 ✓';
      } else {
        btn.className = 'bg-blue-500 text-white px-3 py-1.5 rounded text-sm hover:bg-blue-600';
        txt.textContent = '标记已学';
      }
    }

    function filterLearned() {
      filterMode = filterMode === 'learned' ? '' : 'learned';
      updateFilterButtons();
      search();
    }

    function filterUnlearned() {
      filterMode = filterMode === 'unlearned' ? '' : 'unlearned';
      updateFilterButtons();
      search();
    }

    function updateFilterButtons() {
      const lb = document.getElementById('filterLearnedBtn');
      const ub = document.getElementById('filterUnlearnedBtn');
      lb.className = filterMode === 'learned' ? 'px-2 py-1 bg-blue-500 text-white rounded text-xs' : 'px-2 py-1 bg-blue-100 text-blue-700 rounded text-xs hover:bg-blue-200';
      ub.className = filterMode === 'unlearned' ? 'px-2 py-1 bg-blue-500 text-white rounded text-xs' : 'px-2 py-1 bg-gray-100 rounded text-xs hover:bg-gray-200';
    }

    function clearLearning() {
      if (confirm('确认重置所有学习进度？')) {
        learnedSet = new Set();
        localStorage.setItem(LEARN_KEY, JSON.stringify([]));
        updateLearnProgress();
        if (filterMode) search();
        else renderResults(currentResults);
      }
    }

      {"id":"zhuangzi_005","classical":"吾生也有涯，而知也无涯。","modern":"我的生命是有限的，而知识是无限的。","source":"庄子·养生主","dynasty":"战国","difficulty":"初级","genre":"子","keywords":["庄子","求知","生命"],"notes":""},
      {"id":"zhuangzi_006","classical":"相濡以沫，不如相忘于江湖。","modern":"互相吐口水来湿润对方，不如各自在江湖中自由游弋而彼此相忘。","source":"庄子·大宗师","dynasty":"战国","difficulty":"中级","genre":"子","keywords":["庄子","自由","超脱"],"notes":""},
      {"id":"zhuangzi_007","classical":"天地与我并生，而万物与我为一。","modern":"天地与我一同存在，万物与我合为一体。","source":"庄子·齐物论","dynasty":"战国","difficulty":"高级","genre":"子","keywords":["庄子","齐物","天人合一"],"notes":""},
      {"id":"zhuangzi_008","classical":"井蛙不可以语于海者，拘于虚也。","modern":"不能和井底的青蛙谈论大海，因为它的眼界受到狭小空间的局限。","source":"庄子·秋水","dynasty":"战国","difficulty":"中级","genre":"子","keywords":["庄子","眼界","局限"],"notes":""},
      {"id":"zhuangzi_009","classical":"以无厚入有间，恢恢乎其于游刃必有余地矣。","modern":"用很薄的刀刃插入骨节间的空隙，宽宽绰绰的，对于刀刃的运转必然有足够的余地。","source":"庄子·养生主","dynasty":"战国","difficulty":"高级","genre":"子","keywords":["庄子","游刃有余","技巧"],"notes":"庖丁解牛的故事。"},
      {"id":"zhuangzi_010","classical":"夏虫不可以语于冰者，笃于时也。","modern":"不能和夏天的虫子谈论冰，因为它受到时令的限制。","source":"庄子·秋水","dynasty":"战国","difficulty":"中级","genre":"子","keywords":["庄子","局限","认知"],"notes":""},
      {"id":"zhuangzi_011","classical":"人生天地之间，若白驹之过隙，忽然而已。","modern":"人生在天地之间，就像白马掠过缝隙，只是一瞬间罢了。","source":"庄子·知北游","dynasty":"战国","difficulty":"中级","genre":"子","keywords":["庄子","人生","短暂"],"notes":""},
      {"id":"zhuangzi_012","classical":"独与天地精神往来，而不敖倪于万物。","modern":"独自与天地精神相往来，而不傲视万物。","source":"庄子·天下","dynasty":"战国","difficulty":"高级","genre":"子","keywords":["庄子","精神","超脱"],"notes":""},
      {"id":"shiji_001","classical":"项庄拔剑起舞，项伯亦拔剑起舞，常以身翼蔽沛公，庄不得击。","modern":"项庄拔出剑开始起舞，项伯也拔出剑起舞，常常用自己的身体像翅膀一样掩护沛公，项庄无法攻击。","source":"史记·项羽本纪","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["鸿门宴","项羽","刘邦"],"notes":"描写鸿门宴上\"项庄舞剑，意在沛公\"的紧张场面。"},
      {"id":"shiji_002","classical":"燕雀安知鸿鹄之志哉！","modern":"燕子和麻雀怎么能知道天鹅的志向呢！","source":"史记·陈涉世家","dynasty":"汉","difficulty":"初级","genre":"史","keywords":["志向","陈胜","比喻"],"notes":""},
      {"id":"shiji_003","classical":"桃李不言，下自成蹊。","modern":"桃树李树不会说话，但树下自然被走出一条小路。","source":"史记·李将军列传","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["品德","感召","比喻"],"notes":""},
      {"id":"shiji_004","classical":"王侯将相宁有种乎？","modern":"王侯将相难道是天生的贵种吗？","source":"史记·陈涉世家","dynasty":"汉","difficulty":"初级","genre":"史","keywords":["平等","反抗","陈胜"],"notes":"陈胜起义时的著名口号。"},
      {"id":"shiji_005","classical":"项庄舞剑，意在沛公。","modern":"项庄舞剑的目的，是要刺杀沛公刘邦。","source":"史记·项羽本纪","dynasty":"汉","difficulty":"初级","genre":"史","keywords":["鸿门宴","谋略","暗算"],"notes":""},
      {"id":"shiji_006","classical":"运筹帷幄之中，决胜千里之外。","modern":"在军帐中谋划策略，就能决定千里之外的胜利。","source":"史记·高祖本纪","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["谋略","张良","智慧"],"notes":"刘邦评价张良的话。"},
      {"id":"shiji_007","classical":"天下熙熙，皆为利来；天下攘攘，皆为利往。","modern":"天下人吵吵嚷嚷，都是为了利益而来；天下人挤来挤去，都是为了利益而去。","source":"史记·货殖列传","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["利益","人性","经济"],"notes":""},
      {"id":"shiji_008","classical":"智者千虑，必有一失；愚者千虑，必有一得。","modern":"聪明人考虑一千次，也一定会出现一次失误；愚笨的人考虑一千次，也一定会有一点收获。","source":"史记·淮阴侯列传","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["智慧","谦虚","辩证"],"notes":""},
      {"id":"shiji_009","classical":"不飞则已，一飞冲天；不鸣则已，一鸣惊人。","modern":"不飞就算了，一飞就要冲上天；不叫就算了，一叫就要让人震惊。","source":"史记·滑稽列传","dynasty":"汉","difficulty":"初级","genre":"史","keywords":["隐忍","爆发","志向"],"notes":"出自淳于髡劝齐威王的故事。"},
      {"id":"shiji_010","classical":"前事之不忘，后事之师也。","modern":"不忘记以前的经验教训，就可以作为以后做事的借鉴。","source":"史记·秦始皇本纪","dynasty":"汉","difficulty":"初级","genre":"史","keywords":["历史","借鉴","教训"],"notes":""},
      {"id":"shiji_011","classical":"众口铄金，积毁销骨。","modern":"众人的言论可以熔化金属，积久的诽谤可以销毁骨头。","source":"史记·张仪列传","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["舆论","谣言","影响"],"notes":""},
      {"id":"shiji_012","classical":"飞鸟尽，良弓藏；狡兔死，走狗烹。","modern":"飞鸟打完了，好弓就被收起来；兔子死了，猎狗就被煮了吃。","source":"史记·越王勾践世家","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["功成身退","警示","历史"],"notes":""},
      {"id":"shiji_013","classical":"西楚霸王，力拔山兮气盖世。","modern":"西楚霸王项羽，力量能拔起大山，气势压过世人。","source":"史记·项羽本纪","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["项羽","英雄","悲壮"],"notes":"项羽垓下歌的化用。"},
      {"id":"shiji_014","classical":"失之毫厘，谬以千里。","modern":"开始差了一点点，结果就会相差千里。","source":"史记·太史公自序","dynasty":"汉","difficulty":"初级","genre":"史","keywords":["细节","误差","警示"],"notes":""},
      {"id":"shiji_015","classical":"匈奴未灭，何以家为？","modern":"匈奴还没有消灭，怎么能先考虑自己的家呢？","source":"史记·卫将军骠骑列传","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["霍去病","报国","奉献"],"notes":"霍去病的名言。"},
      {"id":"shiji_016","classical":"风萧萧兮易水寒，壮士一去兮不复还。","modern":"风声萧萧啊易水寒冷，壮士这一去啊不再回来。","source":"史记·刺客列传","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["荆轲","悲壮","刺客"],"notes":"荆轲刺秦前的悲歌。"},
      {"id":"shiji_017","classical":"苦言药也，甘言疾也。","modern":"逆耳的忠言像苦口的良药，甜言蜜语像致病的毒药。","source":"史记·商君列传","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["忠言","警示","修养"],"notes":""},
      {"id":"shiji_018","classical":"能行之者未必能言，能言之者未必能行。","modern":"能做的人不一定能说，能说的人不一定能做。","source":"史记·孙子吴起列传","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["言行","实践","智慧"],"notes":""},
      {"id":"shiji_019","classical":"人固有一死，或重于泰山，或轻于鸿毛。","modern":"人本来都有一死，有的人死得比泰山还重，有的人死得比鸿毛还轻。","source":"史记·报任安书","dynasty":"汉","difficulty":"初级","genre":"史","keywords":["生死","价值","司马迁"],"notes":"司马迁的名句。"},
      {"id":"shiji_020","classical":"顺之者昌，逆之者亡。","modern":"顺应它的就会昌盛，违背它的就会灭亡。","source":"史记·太史公自序","dynasty":"汉","difficulty":"初级","genre":"史","keywords":["规律","顺势","兴亡"],"notes":""},
      {"id":"shiji_021","classical":"千金之子，坐不垂堂。","modern":"富贵人家的子弟，不坐在屋檐下（怕瓦片掉下来砸到）。","source":"史记·袁盎晁错列传","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["珍惜","谨慎","身份"],"notes":""},
      {"id":"shiji_022","classical":"一死一生，乃知交情。一贫一富，乃知交态。一贵一贱，交情乃见。","modern":"经过生死才知道交情的深浅，经过贫富才知道交往的态度，经过贵贱才看到真交情。","source":"史记·汲郑列传","dynasty":"汉","difficulty":"高级","genre":"史","keywords":["交友","世态","炎凉"],"notes":""},
      {"id":"shiji_023","classical":"酒极则乱，乐极则悲。","modern":"饮酒过度就会昏乱，快乐到极点就会生出悲伤。","source":"史记·滑稽列传","dynasty":"汉","difficulty":"初级","genre":"史","keywords":["中庸","节制","哲理"],"notes":""},
      {"id":"shiji_024","classical":"农不出则乏其食，工不出则乏其事，商不出则三宝绝。","modern":"农民不耕种就缺少粮食，工匠不劳作就缺少器物，商人不流通那么各物就断绝了。","source":"史记·货殖列传","dynasty":"汉","difficulty":"高级","genre":"史","keywords":["经济","分工","社会"],"notes":""},
      {"id":"shiji_025","classical":"猛虎之犹豫，不若蜂虿之致螫。","modern":"猛虎犹豫不决，还不如蜂蝎的狠狠一刺。","source":"史记·淮阴侯列传","dynasty":"汉","difficulty":"高级","genre":"史","keywords":["果断","行动","决心"],"notes":""},
      {"id":"shiji_026","classical":"大行不顾细谨，大礼不辞小让。","modern":"做大事不必顾及细小的礼节，行大礼不必计较小的谦让。","source":"史记·项羽本纪","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["格局","气度","行事"],"notes":""},
      {"id":"shiji_027","classical":"士为知己者死。","modern":"有节操的人愿意为理解自己的人献出生命。","source":"史记·刺客列传","dynasty":"汉","difficulty":"初级","genre":"史","keywords":["知己","忠诚","气节"],"notes":""},
      {"id":"shiji_028","classical":"明修栈道，暗渡陈仓。","modern":"公开修建栈道，暗地里从陈仓道出兵。","source":"史记·高祖本纪","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["谋略","韩信","兵法"],"notes":""},
      {"id":"shiji_029","classical":"卧薪尝胆。","modern":"睡在柴草上，尝苦胆的味道。","source":"史记·越王勾践世家","dynasty":"汉","difficulty":"初级","genre":"史","keywords":["忍辱","复仇","励志"],"notes":"越王勾践的故事。"},
      {"id":"shiji_030","classical":"破釜沉舟。","modern":"打破锅碗，凿沉船只，表示决一死战。","source":"史记·项羽本纪","dynasty":"汉","difficulty":"初级","genre":"史","keywords":["决心","死战","项羽"],"notes":"项羽巨鹿之战的典故。"},
      {"id":"shiji_031","classical":"项王军壁垓下，兵少食尽，汉军及诸侯兵围之数重。夜闻汉军四面皆楚歌。","modern":"项羽的军队驻扎在垓下，兵少粮尽，汉军和各路诸侯军队将他们重重包围。夜里听到汉军四面唱起楚歌。","source":"史记·项羽本纪","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["项羽","垓下","四面楚歌"],"notes":"四面楚歌的典故。"},
      {"id":"shiji_032","classical":"力拔山兮气盖世，时不利兮骓不逝。骓不逝兮可奈何，虞兮虞兮奈若何！","modern":"力量拔山啊气概盖世，时运不利啊乌骓马不再奔跑。乌骓不跑啊可怎么办，虞姬啊虞姬啊该怎么安排你！","source":"史记·项羽本纪","dynasty":"汉","difficulty":"中级","genre":"史","keywords":["项羽","垓下歌","悲壮"],"notes":"项羽的绝命诗。"},
      {"id":"zhanguoce_001","classical":"狡兔有三窟，仅得免其死耳。","modern":"狡猾的兔子有三个洞穴，才能免除一死罢了。","source":"战国策·齐策四","dynasty":"西汉","difficulty":"中级","genre":"史","keywords":["策略","准备","安全"],"notes":"\"狡兔三窟\"的出处，比喻多留退路。"},
      {"id":"zhanguoce_002","classical":"士为知己者死，女为悦己者容。","modern":"士人愿意为赏识自己的人献出生命，女子愿意为喜欢自己的人打扮。","source":"战国策·赵策一","dynasty":"西汉","difficulty":"中级","genre":"史","keywords":["知己","忠诚","情感"],"notes":""},
      {"id":"zhanguoce_003","classical":"前事不忘，后事之师。","modern":"不忘记以前的经验教训，可以作为以后行事的借鉴。","source":"战国策·赵策一","dynasty":"西汉","difficulty":"初级","genre":"史","keywords":["教训","借鉴","历史"],"notes":""},
      {"id":"sunzi_001","classical":"知己知彼，百战不殆。","modern":"了解自己也了解对方，打一百次仗都不会危险。","source":"孙子·谋攻篇","dynasty":"春秋","difficulty":"初级","genre":"子","keywords":["军事","智慧","策略"],"notes":""},
      {"id":"sunzi_002","classical":"兵者，诡道也。故能而示之不能，用而示之不用。","modern":"用兵是一种诡诈之术。所以能打却装作不能打，要打却装作不想打。","source":"孙子·计篇","dynasty":"春秋","difficulty":"中级","genre":"子","keywords":["军事","谋略","诡道"],"notes":""},
      {"id":"caocao_001","classical":"对酒当歌，人生几何！譬如朝露，去日苦多。","modern":"对着美酒应当高歌，人生能有多少时光！就像早晨的露水，逝去的日子苦于太多。","source":"短歌行","dynasty":"汉","difficulty":"中级","genre":"集","keywords":["曹操","人生","感慨"],"notes":""},
      {"id":"caocao_002","classical":"老骥伏枥，志在千里。烈士暮年，壮心不已。","modern":"老马伏在马槽边，志向仍在千里之外。英雄到了晚年，雄心壮志依然不减。","source":"龟虽寿","dynasty":"汉","difficulty":"初级","genre":"集","keywords":["曹操","壮志","老年"],"notes":""},
      {"id":"caocao_003","classical":"东临碣石，以观沧海。水何澹澹，山岛竦峙。","modern":"东行登上碣石山，来观赏大海。海水多么宽阔，山岛高高地耸立。","source":"观沧海","dynasty":"汉","difficulty":"中级","genre":"集","keywords":["曹操","海景","胸怀"],"notes":""},
      {"id":"chuci_001","classical":"路漫漫其修远兮，吾将上下而求索。","modern":"前方的道路又远又长，我将不遗余力地上下探索追求。","source":"离骚","dynasty":"战国","difficulty":"中级","genre":"集","keywords":["屈原","追求","理想"],"notes":""},
      {"id":"chuci_002","classical":"长太息以掩涕兮，哀民生之多艰。","modern":"长长地叹息着擦去眼泪，哀叹人民的生活如此艰难。","source":"离骚","dynasty":"战国","difficulty":"中级","genre":"集","keywords":["屈原","忧民","爱国"],"notes":""},
      {"id":"chuci_003","classical":"举世皆浊我独清，众人皆醉我独醒。","modern":"整个世间都混浊只有我清白，众人都沉醉只有我清醒。","source":"渔父","dynasty":"战国","difficulty":"中级","genre":"集","keywords":["屈原","孤高","气节"],"notes":""},
      {"id":"yueyanglou_001","classical":"先天下之忧而忧，后天下之乐而乐。","modern":"在天下人忧愁之前先忧愁，在天下人快乐之后才快乐。","source":"岳阳楼记","dynasty":"宋","difficulty":"中级","genre":"集","keywords":["范仲淹","忧国忧民","胸怀"],"notes":""},
      {"id":"yueyanglou_002","classical":"不以物喜，不以己悲。","modern":"不因外物好坏和自己得失而感到欢喜或悲伤。","source":"岳阳楼记","dynasty":"宋","difficulty":"中级","genre":"集","keywords":["范仲淹","修养","豁达"],"notes":""},
      {"id":"yueyanglou_003","classical":"居庙堂之高则忧其民，处江湖之远则忧其君。","modern":"身居朝廷高位就为百姓担忧，身在偏远江湖就为君主担忧。","source":"岳阳楼记","dynasty":"宋","difficulty":"中级","genre":"集","keywords":["范仲淹","忧国","担当"],"notes":""},
      {"id":"chushibiao_001","classical":"鞠躬尽瘁，死而后已。","modern":"勤勤恳恳，竭尽全力，到死才停止。","source":"后出师表","dynasty":"三国","difficulty":"初级","genre":"集","keywords":["诸葛亮","忠诚","奉献"],"notes":""},
      {"id":"chushibiao_002","classical":"亲贤臣，远小人，此先汉所以兴隆也。","modern":"亲近贤臣，远离小人，这是前汉兴隆的原因。","source":"出师表","dynasty":"三国","difficulty":"中级","genre":"集","keywords":["诸葛亮","治国","用人之道"],"notes":""},
      {"id":"chushibiao_003","classical":"受任于败军之际，奉命于危难之间。","modern":"在军队失败的时候接受了任命，在危难的时刻奉命出使。","source":"出师表","dynasty":"三国","difficulty":"中级","genre":"集","keywords":["诸葛亮","担当","忠诚"],"notes":""},
      {"id":"chushibiao_004","classical":"静以修身，俭以养德。","modern":"以宁静来修养身心，以节俭来培养品德。","source":"诫子书","dynasty":"三国","difficulty":"初级","genre":"集","keywords":["诸葛亮","修身","节俭"],"notes":""},
      {"id":"chushibiao_005","classical":"非淡泊无以明志，非宁静无以致远。","modern":"不恬淡寡欲就无法明确志向，不宁静就无法达到高远的境界。","source":"诫子书","dynasty":"三国","difficulty":"初级","genre":"集","keywords":["诸葛亮","淡泊","宁静致远"],"notes":""},
      {"id":"taohuayuanji_001","classical":"忽逢桃花林，夹岸数百步，中无杂树，芳草鲜美，落英缤纷。","modern":"忽然遇到一片桃花林，两岸几百步内，中间没有别的树，芳香的青草鲜嫩美丽，落花繁多。","source":"桃花源记","dynasty":"晋","difficulty":"中级","genre":"集","keywords":["陶渊明","桃花源","理想国"],"notes":""},
      {"id":"taohuayuanji_002","classical":"问今是何世，乃不知有汉，无论魏晋。","modern":"他们问现在是什么朝代，竟然不知道有过汉朝，更不必说魏晋了。","source":"桃花源记","dynasty":"晋","difficulty":"初级","genre":"集","keywords":["陶渊明","避世","隔绝"],"notes":""},
      {"id":"taohuayuanji_003","classical":"林尽水源，便得一山，山有小口，仿佛若有光。","modern":"桃林在溪水发源处到了尽头，便看到一座山，山上有个小洞口，仿佛有光亮。","source":"桃花源记","dynasty":"晋","difficulty":"中级","genre":"集","keywords":["陶渊明","桃花源","探寻"],"notes":""},
      {"id":"taohuayuanji_004","classical":"黄发垂髫，并怡然自乐。","modern":"老人小孩都安适愉快、自得其乐。","source":"桃花源记","dynasty":"晋","difficulty":"初级","genre":"集","keywords":["陶渊明","和谐","安居乐业"],"notes":""},
      {"id":"ailian_001","classical":"出淤泥而不染，濯清涟而不妖。","modern":"从淤泥中生长出来却不沾染污秽，经过清水的洗涤却不显得妖艳。","source":"爱莲说","dynasty":"宋","difficulty":"初级","genre":"集","keywords":["周敦颐","莲花","高洁"],"notes":""},
      {"id":"ailian_002","classical":"中通外直，不蔓不枝，香远益清，亭亭净植。","modern":"茎内中空外直，不牵牵连连也不枝枝节节，香气散播越远越清幽，笔直洁净地挺立。","source":"爱莲说","dynasty":"宋","difficulty":"中级","genre":"集","keywords":["周敦颐","莲花","君子"],"notes":""},
      {"id":"jushe_001","classical":"天行健，君子以自强不息。","modern":"天的运行刚健有力，君子应效法天道，自强不息。","source":"周易·乾卦","dynasty":"周","difficulty":"高级","genre":"经","keywords":["周易","自强","哲理"],"notes":""},
      {"id":"jushe_002","classical":"地势坤，君子以厚德载物。","modern":"大地的气势宽厚和顺，君子应效法大地，以深厚的德行承载万物。","source":"周易·坤卦","dynasty":"周","difficulty":"高级","genre":"经","keywords":["周易","厚德","包容"],"notes":""},
      {"id":"liubei_001","classical":"勿以恶小而为之，勿以善小而不为。","modern":"不要因为坏事很小就去做，不要因为好事很小就不去做。","source":"三国志·蜀书·先主传","dynasty":"三国","difficulty":"初级","genre":"史","keywords":["刘备","品德","教育"],"notes":"刘备给儿子刘禅的遗诏中的话。"},
      {"id":"liubei_002","classical":"惟贤惟德，能服于人。","modern":"只有贤能和德行，才能让人信服。","source":"三国志·蜀书·先主传","dynasty":"三国","difficulty":"中级","genre":"史","keywords":["刘备","德行","人才"],"notes":""},
      {"id":"guyuanxing_001","classical":"盛年不重来，一日难再晨。及时当勉励，岁月不待人。","modern":"壮年不会重来，一天不会有两个早晨。应当及时努力，岁月不等人。","source":"杂诗","dynasty":"晋","difficulty":"初级","genre":"集","keywords":["陶渊明","惜时","劝学"],"notes":""},
      {"id":"hanfeizi_001","classical":"千里之堤，溃于蚁穴。","modern":"千里的堤坝，因蚂蚁的洞穴而溃决。","source":"韩非子·喻老","dynasty":"战国","difficulty":"初级","genre":"子","keywords":["细节","隐患","警示"],"notes":""},
      {"id":"hanfeizi_002","classical":"以子之矛，攻子之盾。","modern":"用你的矛来攻击你的盾。","source":"韩非子·难一","dynasty":"战国","difficulty":"中级","genre":"子","keywords":["逻辑","矛盾","自相矛盾"],"notes":"自相矛盾典故的出处。"},
      {"id":"hanfeizi_003","classical":"目失镜，则无以正须眉；身失道，则无以知迷惑。","modern":"眼睛失去镜子就无法端正胡须眉毛；自身失去道就无法辨明迷惑。","source":"韩非子·观行","dynasty":"战国","difficulty":"高级","genre":"子","keywords":["修养","反省","方法"],"notes":""},
      {"id":"xunzi_001","classical":"青，取之于蓝，而青于蓝。","modern":"青色从蓝草中提取出来，却比蓝草的颜色更青。","source":"荀子·劝学","dynasty":"战国","difficulty":"初级","genre":"子","keywords":["荀子","学习","超越"],"notes":"青出于蓝而胜于蓝的出处。"},
      {"id":"xunzi_002","classical":"不积跬步，无以至千里；不积小流，无以成江海。","modern":"不积累半步一步，就无法到达千里之外；不汇集小溪流，就无法形成江海。","source":"荀子·劝学","dynasty":"战国","difficulty":"中级","genre":"子","keywords":["荀子","积累","坚持"],"notes":""},
      {"id":"xunzi_003","classical":"锲而不舍，金石可镂。","modern":"不停地雕刻，金属和石头也能雕刻成功。","source":"荀子·劝学","dynasty":"战国","difficulty":"初级","genre":"子","keywords":["荀子","坚持","毅力"],"notes":""},
      {"id":"mengzi_011","classical":"尽信书，则不如无书。","modern":"完全相信书本，还不如没有书。","source":"孟子·尽心下","dynasty":"战国","difficulty":"初级","genre":"经","keywords":["读书","思考","质疑"],"notes":""},
      {"id":"mengzi_012","classical":"人有不为也，而后可以有为。","modern":"人要有所不为，然后才能有所作为。","source":"孟子·离娄下","dynasty":"战国","difficulty":"中级","genre":"经","keywords":["取舍","专注","作为"],"notes":""}
    ];
    // 引入唐诗40段
    const TANGSHI = [
      {"id":"tangshi_001","classical":"床前明月光，疑是地上霜。举头望明月，低头思故乡。","modern":"床前洒满明亮的月光，好像是地上铺满的白霜。抬头仰望天上的明月，低头思念自己的故乡。","source":"静夜思","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["李白","思乡","月亮"],"notes":"李白的千古名篇。"},
      {"id":"tangshi_002","classical":"白日依山尽，黄河入海流。欲穷千里目，更上一层楼。","modern":"夕阳沿着西山慢慢落下，黄河向着大海奔流而去。要想看到更远的景色，就要再登上一层高楼。","source":"登鹳雀楼","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["王之涣","登高","哲理"],"notes":""},
      {"id":"tangshi_003","classical":"春眠不觉晓，处处闻啼鸟。夜来风雨声，花落知多少。","modern":"春天睡觉不知不觉天就亮了，到处都能听到鸟儿的叫声。昨夜风雨的声音，不知道吹落了多少花朵。","source":"春晓","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["孟浩然","春天","惜春"],"notes":""},
      {"id":"tangshi_004","classical":"好雨知时节，当春乃发生。随风潜入夜，润物细无声。","modern":"好雨似乎懂得季节，春天到来时就悄然降临。随着春风在夜里悄悄洒落，默默滋润着万物而没有声音。","source":"春夜喜雨","dynasty":"唐","difficulty":"中级","genre":"集","keywords":["杜甫","春雨","润物"],"notes":""},
      {"id":"tangshi_005","classical":"离离原上草，一岁一枯荣。野火烧不尽，春风吹又生。","modern":"原野上茂盛的青草，一年枯萎一次又繁盛一次。野火不能把它烧尽，春风吹来它又生长起来。","source":"赋得古原草送别","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["白居易","坚韧","生命力"],"notes":""},
      {"id":"tangshi_006","classical":"日照香炉生紫烟，遥看瀑布挂前川。飞流直下三千尺，疑是银河落九天。","modern":"阳光照射香炉峰升起紫色烟雾，远远看瀑布像挂在山前河流上。水流飞泻直下三千尺，仿佛是银河从九天上落下来。","source":"望庐山瀑布","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["李白","瀑布","壮观"],"notes":""},
      {"id":"tangshi_007","classical":"千山鸟飞绝，万径人踪灭。孤舟蓑笠翁，独钓寒江雪。","modern":"所有山上都没有飞鸟的踪迹，所有道路上都没有人的脚印。只有一条小船上一位披蓑衣的老人，独自在寒冷的江上垂钓。","source":"江雪","dynasty":"唐","difficulty":"中级","genre":"集","keywords":["柳宗元","孤寂","雪景"],"notes":""},
      {"id":"tangshi_008","classical":"两个黄鹂鸣翠柳，一行白鹭上青天。窗含西岭千秋雪，门泊东吴万里船。","modern":"两只黄鹂在翠绿的柳枝间鸣叫，一行白鹭飞上蔚蓝的天空。窗外是西岭上千年不化的积雪，门前停泊着来自万里外的东吴船只。","source":"绝句","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["杜甫","春景","色彩"],"notes":""},
      {"id":"tangshi_009","classical":"红豆生南国，春来发几枝。愿君多采撷，此物最相思。","modern":"红豆生长在南方，春天来了不知长出多少新枝。希望你能多采摘一些，它最能寄托思念之情。","source":"相思","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["王维","红豆","相思"],"notes":""},
      {"id":"tangshi_010","classical":"月落乌啼霜满天，江枫渔火对愁眠。姑苏城外寒山寺，夜半钟声到客船。","modern":"月亮落下乌鸦啼叫寒霜满天，面对江边枫树和渔火忧愁难眠。姑苏城外那寒山寺里，半夜的钟声传到了客船上。","source":"枫桥夜泊","dynasty":"唐","difficulty":"中级","genre":"集","keywords":["张继","愁绪","夜景"],"notes":""},
      {"id":"tangshi_011","classical":"慈母手中线，游子身上衣。临行密密缝，意恐迟迟归。谁言寸草心，报得三春晖。","modern":"慈母手中的针线，缝成了游子身上的衣服。临行前密密地缝，怕的是孩子迟迟不归。谁说小草一样的心意，能报答春天阳光般的母爱呢？","source":"游子吟","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["孟郊","母爱","感恩"],"notes":""},
      {"id":"tangshi_012","classical":"海上生明月，天涯共此时。","modern":"海上升起一轮明月，远在天涯的人此刻都共赏同一轮月亮。","source":"望月怀远","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["张九龄","月亮","思念"],"notes":""},
      {"id":"tangshi_013","classical":"独在异乡为异客，每逢佳节倍思亲。","modern":"独自在他乡做异乡的客人，每到佳节就更加思念亲人。","source":"九月九日忆山东兄弟","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["王维","思乡","佳节"],"notes":""},
      {"id":"tangshi_014","classical":"大漠孤烟直，长河落日圆。","modern":"广阔沙漠中一缕孤烟直直升起，黄河上落日又大又圆。","source":"使至塞上","dynasty":"唐","difficulty":"中级","genre":"集","keywords":["王维","沙漠","边塞"],"notes":""},
      {"id":"tangshi_015","classical":"停车坐爱枫林晚，霜叶红于二月花。","modern":"停下车来是因为喜爱傍晚的枫林，经霜的枫叶比二月的春花还要红艳。","source":"山行","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["杜牧","秋景","枫叶"],"notes":""},
      {"id":"tangshi_016","classical":"锄禾日当午，汗滴禾下土。谁知盘中餐，粒粒皆辛苦。","modern":"锄禾时正值正午，汗水滴落在禾苗下的泥土里。有谁知道盘中的饭食，每一粒都凝聚着辛苦的劳作。","source":"悯农","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["李绅","勤俭","农民"],"notes":""},
      {"id":"tangshi_017","classical":"会当凌绝顶，一览众山小。","modern":"一定要登上泰山的最高峰，那时看四周的群山都会显得矮小。","source":"望岳","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["杜甫","志向","泰山"],"notes":""},
      {"id":"tangshi_018","classical":"无边落木萧萧下，不尽长江滚滚来。","modern":"无边无际的落叶纷纷飘下，没有尽头的长江水滚滚奔来。","source":"登高","dynasty":"唐","difficulty":"中级","genre":"集","keywords":["杜甫","秋景","沧桑"],"notes":""},
      {"id":"tangshi_019","classical":"劝君更尽一杯酒，西出阳关无故人。","modern":"劝你再喝一杯送别的酒吧，出了阳关向西走就再也见不到老朋友了。","source":"送元二使安西","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["王维","送别","友情"],"notes":""},
      {"id":"tangshi_020","classical":"忽如一夜春风来，千树万树梨花开。","modern":"忽然好像一夜春风吹来，千树万树的梨花都盛开了。","source":"白雪歌送武判官归京","dynasty":"唐","difficulty":"中级","genre":"集","keywords":["岑参","雪景","边塞"],"notes":"以梨花喻雪的千古名句。"},
      {"id":"tangshi_021","classical":"落霞与孤鹜齐飞，秋水共长天一色。","modern":"晚霞与孤雁一起飞翔，秋水与天空连成一片同一种颜色。","source":"滕王阁序","dynasty":"唐","difficulty":"高级","genre":"集","keywords":["王勃","秋景","骈文"],"notes":""},
      {"id":"tangshi_022","classical":"海内存知己，天涯若比邻。","modern":"只要四海之内有知心朋友，即使远在天边也像近邻一样。","source":"送杜少府之任蜀州","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["王勃","友情","送别"],"notes":""},
      {"id":"tangshi_023","classical":"同是天涯沦落人，相逢何必曾相识。","modern":"都是流落天涯的不幸之人，相逢又何必一定要曾经相识呢。","source":"琵琶行","dynasty":"唐","difficulty":"中级","genre":"集","keywords":["白居易","感慨","命运"],"notes":""},
      {"id":"tangshi_024","classical":"天生我材必有用，千金散尽还复来。","modern":"上天造就了我这人才一定有它的用处，千金散尽了也还会再回来。","source":"将进酒","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["李白","自信","豪放"],"notes":""},
      {"id":"tangshi_025","classical":"安能摧眉折腰事权贵，使我不得开心颜！","modern":"怎么能低眉弯腰去侍奉权贵，让我不能开开心心呢！","source":"梦游天姥吟留别","dynasty":"唐","difficulty":"中级","genre":"集","keywords":["李白","气节","自由"],"notes":""},
      {"id":"tangshi_026","classical":"此情可待成追忆，只是当时已惘然。","modern":"这份情愫在追忆时令人感慨，只是在当时就已经感到惘然若失了。","source":"锦瑟","dynasty":"唐","difficulty":"高级","genre":"集","keywords":["李商隐","情思","感怀"],"notes":""},
      {"id":"tangshi_027","classical":"相见时难别亦难，东风无力百花残。","modern":"相见不易所以离别也更难，东风无力百花已经凋残。","source":"无题","dynasty":"唐","difficulty":"中级","genre":"集","keywords":["李商隐","离别","爱情"],"notes":""},
      {"id":"tangshi_028","classical":"但愿人长久，千里共婵娟。","modern":"只希望亲人都能平安长久，即使相隔千里也能共赏这美好的月光。","source":"水调歌头","dynasty":"宋","difficulty":"初级","genre":"集","keywords":["苏轼","月亮","祝愿"],"notes":""},
      {"id":"tangshi_029","classical":"春蚕到死丝方尽，蜡炬成灰泪始干。","modern":"春蚕到死吐丝才吐完，蜡烛烧成灰烬时蜡泪才干。","source":"无题","dynasty":"唐","difficulty":"中级","genre":"集","keywords":["李商隐","奉献","爱情"],"notes":""},
      {"id":"tangshi_030","classical":"桃花潭水深千尺，不及汪伦送我情。","modern":"桃花潭水有千尺之深，也比不上汪伦送别我的情意深。","source":"赠汪伦","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["李白","友情","送别"],"notes":""},
      {"id":"tangshi_031","classical":"孤帆远影碧空尽，唯见长江天际流。","modern":"孤独的帆船在碧蓝的天空下渐渐消失，只看到长江水在天边流淌。","source":"黄鹤楼送孟浩然之广陵","dynasty":"唐","difficulty":"中级","genre":"集","keywords":["李白","送别","长江"],"notes":""},
      {"id":"tangshi_032","classical":"莫愁前路无知己，天下谁人不识君。","modern":"不要发愁前路没有知己，天下有谁不认识您呢？","source":"别董大","dynasty":"唐","difficulty":"初级","genre":"集","keywords":["高适","送别","豪迈"],"notes":""},
      {"id":"tangshi_033","classical":"明月几时有？把酒问青天。","modern":"明月是从什么时候开始有的？我端着酒杯询问青天。","source":"水调歌头","dynasty":"宋","difficulty":"初级","genre":"集","keywords":["苏轼","明月","哲理"],"notes":""},
      {"id":"tangshi_034","classical":"江山代有才人出，各领风骚数百年。","modern":"每个时代都有杰出的人才出现，各自引领文坛数百年。","source":"论诗","dynasty":"清","difficulty":"中级","genre":"集","keywords":["赵翼","人才","创新"],"notes":""},
      {"id":"tangshi_035","classical":"问渠那得清如许？为有源头活水来。","modern":"问它为什么这样清澈？因为有活水不断从源头流来。","source":"观书有感","dynasty":"宋","difficulty":"中级","genre":"集","keywords":["朱熹","读书","哲理"],"notes":""},
      {"id":"tangshi_036","classical":"纸上得来终觉浅，绝知此事要躬行。","modern":"从书本上得来的终究觉得浅薄，要真正理解事物的本质必须亲身实践。","source":"冬夜读书示子聿","dynasty":"宋","difficulty":"中级","genre":"集","keywords":["陆游","实践","学习"],"notes":""},
      {"id":"tangshi_037","classical":"不识庐山真面目，只缘身在此山中。","modern":"看不清庐山的真正面貌，只是因为自己身在这座山之中。","source":"题西林壁","dynasty":"宋","difficulty":"初级","genre":"集","keywords":["苏轼","哲理","视角"],"notes":""},
      {"id":"tangshi_038","classical":"山重水复疑无路，柳暗花明又一村。","modern":"山峦重叠水流曲折好像无路可走，柳暗花明中忽然又出现一个村庄。","source":"游山西村","dynasty":"宋","difficulty":"初级","genre":"集","keywords":["陆游","希望","转折"],"notes":""},

      {"id":"lunyu_032","classical":"质胜文则野，文胜质则史。文质彬彬，然后君子。","modern":"质朴多于文采就显粗野，文采多于质朴就显浮夸。文采和质朴搭配得当，才是君子。","source":"论语·雍也","dynasty":"春秋","difficulty":"中级","genre":"经","keywords":["君子","文质","修养"],"notes":""},

    ];
    // 合并所有数据
    corpus.push(...corpusExtra, ...TANGSHI, ...SONGCI, ...EXTRA);
    let currentResults = [];
    let currentDetailItem = null;

    function init() {
      const sources = [...new Set(corpus.map(i => i.source))].sort();
      const sel = document.getElementById('filterSource');
      sel.innerHTML = '<option value="">全部出处</option>' + sources.map(s => `<option value="${s}">${s}</option>`).join('');

      document.getElementById('totalCount').textContent = corpus.length;
      document.getElementById('genreCount').textContent = new Set(corpus.map(i => i.genre)).size;
      document.getElementById('sourceCount').textContent = sources.length;

      search();
      updateLearnProgress();

      document.getElementById('detailClassical').addEventListener('click', function(e) {
        showWordPopup(e);
      });
    }

    function search() {
      const q = document.getElementById('searchInput').value.trim();
      const genre = document.getElementById('filterGenre').value;
      const diff = document.getElementById('filterDifficulty').value;
      const src = document.getElementById('filterSource').value;

      let results = corpus.filter(i => {
        if (genre && i.genre !== genre) return false;
        if (diff && i.difficulty !== diff) return false;
        if (src && i.source !== src) return false;
        if (q) {
          const text = `${i.classical}${i.modern}${i.keywords.join('')}${i.notes}${i.source}`;
          return text.includes(q);
        }
        return true;
      });

      // 按学习状态过滤
      if (filterMode === 'learned') {
        results = results.filter(i => learnedSet.has(i.id));
      } else if (filterMode === 'unlearned') {
        results = results.filter(i => !learnedSet.has(i.id));
      }

      currentResults = results;
      document.getElementById('matchCount').textContent = results.length;
      renderResults(results);
    }

    function quickFilter(val) {
      if (val === '初中级') {
        document.getElementById('filterDifficulty').value = '';
        document.getElementById('searchInput').value = '';
        let results = corpus.filter(i => i.difficulty !== '高级');
        currentResults = results;
        document.getElementById('matchCount').textContent = results.length;
        renderResults(results);
      } else if (val === '高级') {
        document.getElementById('filterDifficulty').value = '高级';
        document.getElementById('searchInput').value = '';
        search();
      } else {
        document.getElementById('searchInput').value = val;
        document.getElementById('filterGenre').value = '';
        document.getElementById('filterDifficulty').value = '';
        document.getElementById('filterSource').value = '';
        search();
      }
    }

    function setLayout(l) {
      layout = l;
      ['layoutParallel','layoutStacked','layoutModern'].forEach(id => {
        document.getElementById(id).className = id === `layout${l.charAt(0).toUpperCase()+l.slice(1)}` ? 'px-3 py-1 bg-amber-500 text-white rounded text-sm' : 'px-3 py-1 bg-gray-200 rounded text-sm';
      });
      renderResults(currentResults);
    }

    function renderResults(results) {
      const container = document.getElementById('results');
      if (results.length === 0) {
        container.innerHTML = '<div class="bg-white rounded shadow p-8 text-center text-gray-500"><i class="fa fa-inbox text-3xl block mb-2"></i>没有匹配结果</div>';
        return;
      }

      container.innerHTML = results.map(item => {
        const difficultyColor = item.difficulty === '初级' ? 'bg-green-100 text-green-700' : item.difficulty === '中级' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700';
        const genreColors = { '经': 'bg-red-100 text-red-700', '史': 'bg-blue-100 text-blue-700', '子': 'bg-green-100 text-green-700', '集': 'bg-purple-100 text-purple-700' };
        const isLearned = learnedSet.has(item.id);

        let bodyHtml;
        if (layout === 'modern') {
          bodyHtml = `<div class="text-gray-800">${item.modern}</div>`;
        } else if (layout === 'stacked') {
          bodyHtml = `<div class="text-amber-800 font-medium">${item.classical}</div><div class="text-gray-600 text-sm mt-1 border-t pt-1">${item.modern}</div>`;
        } else {
          bodyHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="text-amber-800 font-medium">${item.classical}</div>
            <div class="text-gray-600">${item.modern}</div>
          </div>`;
        }

        return `<div class="bg-white rounded-lg shadow p-4 hover:shadow-md transition cursor-pointer ${isLearned ? 'border-l-4 border-blue-400' : ''}" onclick="showDetail('${item.id}')">
          <div class="flex items-center gap-2 mb-2 flex-wrap">
            <span class="text-xs px-2 py-0.5 rounded ${genreColors[item.genre] || 'bg-gray-100'}">${item.genre}</span>
            <span class="text-xs px-2 py-0.5 rounded ${difficultyColor}">${item.difficulty}</span>
            <span class="text-xs text-gray-400">${item.source}</span>
            <span class="text-xs text-gray-400">${item.dynasty}</span>
            ${isLearned ? '<span class="text-xs text-blue-500 ml-auto"><i class="fa fa-check-circle"></i> 已学</span>' : ''}
          </div>
          ${bodyHtml}
          <div class="flex gap-1 mt-2 items-center">
            ${item.keywords.map(k => `<span class="text-xs px-1.5 py-0.5 bg-amber-50 text-amber-600 rounded">${k}</span>`).join('')}
            <button onclick="event.stopPropagation();toggleLearned('${item.id}')" class="ml-auto text-xs ${isLearned ? 'text-green-500 hover:text-green-700' : 'text-blue-400 hover:text-blue-600'}">
              <i class="fa ${isLearned ? 'fa-check-circle' : 'fa-circle-o'}"></i>
            </button>
          </div>
        </div>`;
      }).join('');
    }

    function showDetail(id) {
      const item = corpus.find(i => i.id === id);
      if (!item) return;
      currentDetailItem = item;
      currentDetailItemId = id;

      document.getElementById('detailSource').textContent = `${item.source}（${item.dynasty}）`;
      const difficultyColor = item.difficulty === '初级' ? 'bg-green-100 text-green-700' : item.difficulty === '中级' ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700';
      document.getElementById('detailBadge').className = `ml-2 text-xs px-2 py-0.5 rounded ${difficultyColor}`;
      document.getElementById('detailBadge').textContent = item.difficulty;
      document.getElementById('detailClassical').textContent = item.classical;
      document.getElementById('detailModern').textContent = item.modern;

      const notes = document.getElementById('detailNotes');
      if (item.notes) {
        notes.classList.remove('hidden');
        notes.innerHTML = `<strong class="text-gray-500">注释：</strong>${item.notes}`;
      } else {
        notes.classList.add('hidden');
      }

      document.getElementById('detailKeywords').innerHTML = item.keywords.map(k => `<span class="text-xs px-2 py-1 bg-amber-50 text-amber-600 rounded">${k}</span>`).join('');

      // 更新学习按钮
      updateLearnBtn(id);

      document.getElementById('detailModal').classList.remove('hidden');

      const speakBtn = document.getElementById('speakBtn');
      speakBtn.innerHTML = '<i class="fa fa-volume-up"></i> 朗读';
      if (window.speechSynthesis) window.speechSynthesis.cancel();
    }

    function closeDetail(e) {
      if (e.target === e.currentTarget) {
        document.getElementById('detailModal').classList.add('hidden');
        if (window.speechSynthesis) window.speechSynthesis.cancel();
      }
    }

    function speakDetail() {
      if (!currentDetailItem) return;
      if (!window.speechSynthesis) { alert('您的浏览器不支持语音合成功能'); return; }

      const speakBtn = document.getElementById('speakBtn');
      if (window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        speakBtn.innerHTML = '<i class="fa fa-volume-up"></i> 朗读';
        return;
      }

      const text = currentDetailItem.classical;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN';
      utterance.rate = 0.8;
      utterance.pitch = 1.0;

      utterance.onstart = function() { speakBtn.innerHTML = '<i class="fa fa-stop"></i> 停止'; };
      utterance.onend = function() { speakBtn.innerHTML = '<i class="fa fa-volume-up"></i> 朗读'; };
      utterance.onerror = function() { speakBtn.innerHTML = '<i class="fa fa-volume-up"></i> 朗读'; };

      window.speechSynthesis.speak(utterance);
    }

    function showWordPopup(e) {
      const existing = document.getElementById('wordPopupContent');
      if (!existing) return;

      const rect = e.target.getBoundingClientRect();
      const word = e.target.textContent.trim();

      let foundWord = null;
      let definition = null;

      if (WORD_DICT[word]) {
        foundWord = word;
        definition = WORD_DICT[word];
      } else {
        for (const key of Object.keys(WORD_DICT)) {
          if (word.includes(key) && key.length === 1) {
            foundWord = key;
            definition = WORD_DICT[key];
            break;
          }
        }
      }

      const detailClassical = document.getElementById('detailClassical');
      const isInDetail = detailClassical && detailClassical.contains(e.target);

      if (foundWord && definition) {
        const popup = document.getElementById('wordPopup');
        popup.style.display = 'block';
        popup.style.position = 'fixed';
        popup.style.left = Math.min(rect.left + window.scrollX, window.innerWidth - 300) + 'px';
        popup.style.top = Math.min(rect.bottom + window.scrollY + 5, window.innerHeight - 100) + 'px';
        popup.innerHTML = `<div class="font-bold text-amber-700 mb-1">「${foundWord}」</div><div class="text-sm text-gray-600">${definition}</div>`;
        popup.classList.remove('hidden');

        const closePopup = function(ev) {
          if (!popup.contains(ev.target)) {
            popup.style.display = 'none';
            popup.classList.add('hidden');
            document.removeEventListener('click', closePopup);
          }
        };
        setTimeout(() => document.addEventListener('click', closePopup), 100);
      }
    }

    function randomItem() {
      const item = corpus[Math.floor(Math.random() * corpus.length)];
      showDetail(item.id);
    }

    document.getElementById('searchInput').addEventListener('keyup', e => { if (e.key === 'Enter') search(); });
    ['filterGenre','filterDifficulty','filterSource'].forEach(id => {
      document.getElementById(id).addEventListener('change', search);
    });

    init();
  </script>
</body>
</html>
